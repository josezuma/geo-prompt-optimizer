name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: python tests/test_optimizer.py
      - name: Verify CLI works
        run: |
          python scripts/optimizer.py analyze "Best CRM?" --json
          python scripts/optimizer.py optimize TestBrand "Best CRM?" --json
